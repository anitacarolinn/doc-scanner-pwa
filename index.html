<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Doc Scanner</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#14b8a6">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Scanner">
<style>
  :root { --teal:#14b8a6; --teal-d:#0d9488; --blue:#3b82f6; --ink:#1f2937; --muted:#9ca3af;
          --line:#eceef1; --bg:#f4f5f7; --safe-b: env(safe-area-inset-bottom, 0px); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { font-family: -apple-system, system-ui, "Segoe UI", "Microsoft JhengHei", sans-serif;
         background: var(--bg); color: var(--ink); overscroll-behavior: none; }
  #app { max-width: 560px; margin: 0 auto; min-height: 100%; padding-bottom: calc(78px + var(--safe-b)); }

  /* top bar */
  header { position: sticky; top: 0; z-index: 10; background: #fff; padding: 12px 16px 10px;
           border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  header img { width: 26px; height: 26px; }
  header .title { font-weight: 700; font-size: 18px; }
  .search { flex: 1; display: flex; align-items: center; gap: 8px; background: #f1f2f4; border-radius: 10px;
            padding: 8px 12px; color: var(--muted); }
  .search input { border: none; background: none; outline: none; width: 100%; font-size: 15px; color: var(--ink); }

  /* views */
  .view { display: none; padding: 14px 16px 0; }
  .view.on { display: block; }

  /* quick action cards */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .qcard { background: #fff; border-radius: 14px; padding: 18px 12px; text-align: center;
           box-shadow: 0 1px 3px rgba(0,0,0,.06); cursor: pointer; }
  .qcard svg { width: 34px; height: 34px; }
  .qcard div { margin-top: 8px; font-size: 14px; font-weight: 600; }

  .section-title { font-size: 15px; font-weight: 700; margin: 4px 2px 10px; color: #374151; }

  /* document list */
  .doc { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 12px;
         padding: 10px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.05); cursor: pointer; }
  .doc .thumb { width: 56px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--line);
                background: #fafafa; flex: none; }
  .doc .meta { flex: 1; min-width: 0; }
  .doc .meta .nm { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc .meta .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .empty { text-align: center; color: var(--muted); padding: 50px 20px; }
  .empty svg { width: 54px; height: 54px; opacity: .4; }
  .empty p { margin: 12px 0 0; font-size: 14px; }

  /* bottom nav */
  nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; height: calc(64px + var(--safe-b));
        padding-bottom: var(--safe-b); background: #fff; border-top: 1px solid var(--line);
        display: flex; align-items: flex-start; justify-content: space-around; max-width: 560px; margin: 0 auto; }
  nav .tab { flex: 1; text-align: center; padding-top: 9px; color: var(--muted); font-size: 11px; cursor: pointer; }
  nav .tab svg { width: 23px; height: 23px; display: block; margin: 0 auto 3px; }
  nav .tab.active { color: var(--teal); }
  nav .cam { flex: none; width: 64px; }
  nav .cam .fab { width: 60px; height: 60px; margin: -22px auto 0; border-radius: 50%; background: var(--teal);
                  display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(20,184,166,.5); }
  nav .cam .fab svg { width: 28px; height: 28px; stroke: #fff; margin: 0; }
  nav .cam .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .ic { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* scan review (fullscreen) */
  .sheet { position: fixed; inset: 0; z-index: 50; background: #111; color: #fff; display: none; flex-direction: column; }
  .sheet.on { display: flex; }
  .sheet .bar { display: flex; align-items: center; gap: 10px; padding: calc(10px + env(safe-area-inset-top)) 14px 10px; }
  .sheet .bar .grow { flex: 1; }
  .sheet .bar button { background: none; border: none; color: #fff; font-size: 16px; padding: 6px 8px; cursor: pointer; }
  .sheet .bar .save { background: var(--teal); border-radius: 8px; font-weight: 600; padding: 8px 16px; }
  .sheet .pages { flex: 1; overflow: auto; padding: 8px 16px; }
  .sheet .pages img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.4); }
  .sheet .filters { display: flex; gap: 8px; justify-content: center; padding: 10px; }
  .sheet .filters button { background: #2a2a2a; color: #ddd; border: 1px solid #3a3a3a; border-radius: 20px;
                           padding: 7px 16px; font-size: 13px; cursor: pointer; }
  .sheet .filters button.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .sheet .titlerow { padding: 8px 16px calc(12px + var(--safe-b)); }
  .sheet .titlerow input { width: 100%; padding: 11px 12px; border-radius: 10px; border: none; font-size: 15px; }
  .sheet .addmore { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #1f1f1f;
                    color: var(--teal); border: 1px dashed #3a3a3a; border-radius: 10px; font-size: 14px; cursor: pointer; }
  .sheet .adjust { padding: 4px 16px 8px; display: flex; flex-direction: column; gap: 9px; }
  .sheet .adjust label { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #cbd5e1; }
  .sheet .adjust label span { width: 80px; flex: none; }
  .sheet .adjust input[type=range] { flex: 1; accent-color: var(--teal); }
  #ocr-status { padding: 6px 16px 10px; color: var(--teal); font-size: 13px; }
  #ocr-text { flex: 1; margin: 0 16px; padding: 12px; border-radius: 10px; border: none; resize: none;
              font-size: 15px; line-height: 1.5; background: #fff; color: #111; font-family: inherit; }
  .ocr-actions { display: flex; gap: 10px; padding: 12px 16px calc(14px + var(--safe-b)); }
  .ocr-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; background: var(--teal);
                        color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
  #view-doc .vbar button#doc-ocr { background: #fff; color: var(--teal); border-color: var(--teal); }

  /* doc viewer */
  #view-doc .vbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  #view-doc .vbar .nm { flex: 1; font-weight: 700; font-size: 16px; }
  #view-doc .vbar button { border: 1px solid var(--line); background: #fff; border-radius: 9px; padding: 8px 12px;
                           font-size: 13px; cursor: pointer; display: inline-flex; gap: 5px; align-items: center; }
  #view-doc .vbar button.share { background: var(--teal); color: #fff; border-color: var(--teal); }
  #view-doc .vbar button.del { color: #ef4444; }
  #view-doc .pages img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.12); }
  #view-doc .pages { padding-bottom: 76px; }
  #doc-pages .pcard { position: relative; margin-bottom: 12px; }
  #doc-pages .pcard img { width: 100%; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.12); display: block; margin: 0; }
  #doc-pages .pcard .pnum { position: absolute; left: 10px; top: 10px; background: rgba(17,24,39,.62); color: #fff;
    font-size: 12px; padding: 3px 9px; border-radius: 11px; }
  #doc-pages .pcard .pacts { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; }
  #doc-pages .pcard .pacts button { width: 36px; height: 36px; border-radius: 9px; border: none; background: rgba(17,24,39,.62);
    display: flex; align-items: center; justify-content: center; cursor: pointer; }
  #doc-pages .pcard .pacts .ic { width: 18px; height: 18px; stroke: #fff; }
  .docfoot { position: fixed; left: 0; right: 0; bottom: 0; z-index: 21; max-width: 560px; margin: 0 auto;
    background: #fff; border-top: 1px solid var(--line); padding: 10px 16px calc(10px + var(--safe-b)); display: flex; gap: 10px; }
  .docfoot button { flex: 1; padding: 12px; border-radius: 10px; border: none; background: var(--teal); color: #fff;
    font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
  .docfoot .ic { width: 18px; height: 18px; stroke: #fff; }

  .toast { position: fixed; left: 50%; bottom: calc(96px + var(--safe-b)); transform: translateX(-50%);
           background: #111; color: #fff; padding: 10px 16px; border-radius: 22px; font-size: 13px; z-index: 60;
           opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: .92; }

  /* camera FAB "+" badge + remove label */
  nav .cam .fab { position: relative; }
  nav .cam .plus { position: absolute; top: -3px; right: -3px; width: 21px; height: 21px; background: #f97316;
    color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; line-height: 1; border: 2px solid #fff; }

  /* live camera scanner — CamScanner style */
  .camera { position: fixed; inset: 0; z-index: 55; background: #000; display: none; flex-direction: column; }
  .camera.on { display: flex; }

  /* top icon bar */
  .camera .cbar { padding: calc(10px + env(safe-area-inset-top)) 14px 10px; display: flex; align-items: center; gap: 4px; }
  .camera .cbar button { background: none; border: none; color: #fff; padding: 6px; cursor: pointer; display: flex; align-items: center; }
  .camera .cbar .ic { width: 24px; height: 24px; stroke: #fff; fill: none; }
  .camera .cbar .grow { flex: 1; }
  .camera .cbar .hd { position: relative; font-size: 12px; font-weight: 800; letter-spacing: .5px; color: #fff;
    border: 2px solid #fff; border-radius: 6px; padding: 1px 5px; }
  .camera .cbar .hd .rdot, .camera .cbar .fdot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px;
    background: #f97316; border-radius: 50%; }
  .camera #cam-flash.on .ic { stroke: #fbbf24; }
  .camera .cbar .hd.off { opacity: .4; }
  .camera .cbar .hd.off .rdot { display: none; }
  .camera #cam-more.on .ic circle { fill: #2dd4bf !important; }

  /* stage */
  .camera .cam-stage { position: relative; flex: 1; overflow: hidden; background: #000; }
  .camera .cam-stage video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .camera .cam-stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .camera .hint { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); color: #fff; font-size: 12.5px;
    background: rgba(0,0,0,.45); padding: 5px 13px; border-radius: 20px; white-space: nowrap; transition: opacity .2s; }

  /* floating captured-page card (bottom-right of stage) */
  #cam-stack { position: absolute; right: 14px; bottom: 16px; display: none; flex-direction: column; align-items: center; gap: 7px; }
  #cam-stack.on { display: flex; }
  #cam-thumb-wrap { position: relative; cursor: pointer; }
  #cam-thumb { width: 96px; height: 128px; object-fit: cover; border-radius: 9px; border: 2px solid #fff; background: #222;
    box-shadow: 0 4px 14px rgba(0,0,0,.55); display: block; }
  #cam-count { position: absolute; top: -9px; right: -9px; background: #f97316; color: #fff; font-size: 13px; font-weight: 700;
    min-width: 23px; height: 23px; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 0 5px;
    border: 2px solid #000; }
  #cam-chev { position: absolute; right: -10px; top: 50%; transform: translateY(-50%); width: 26px; height: 26px; border-radius: 50%;
    background: rgba(0,0,0,.55); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; }
  #cam-modify { background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 7px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.4); }

  /* Single / Batch segmented pill */
  .cam-seg { display: flex; justify-content: center; padding: 6px 0 2px; }
  .cam-seg .seg-pill { display: inline-flex; background: rgba(40,40,40,.78); border-radius: 22px; padding: 3px; }
  .cam-seg button { background: none; color: #cbd5e1; border: none; padding: 7px 24px; font-size: 14px; border-radius: 20px; cursor: pointer; }
  .cam-seg button.active { background: rgba(255,255,255,.22); color: #fff; font-weight: 600; }

  /* mode strip */
  .cam-modes { display: flex; gap: 26px; overflow-x: auto; padding: 9px 20px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .cam-modes::-webkit-scrollbar { display: none; }
  .cam-modes span { color: #cbd5e1; font-size: 14px; white-space: nowrap; flex: none; opacity: .75; cursor: pointer; }
  .cam-modes span.active { color: var(--teal); font-weight: 700; opacity: 1; }
  .cam-seg.hide, .cam-modes.hide { display: none; }

  /* bottom controls */
  .camera .cam-controls { position: relative; display: flex; align-items: center; justify-content: space-between;
    padding: 6px 24px calc(18px + var(--safe-b)); }
  .cam-side { width: 84px; display: flex; align-items: center; }
  .cam-side.right { justify-content: flex-end; }
  .cam-side button { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; }
  .cam-side .ic { width: 30px; height: 30px; stroke: #fff; fill: none; }
  #cam-done { background: var(--teal); color: #fff; border-radius: 9px; padding: 11px 22px; font-weight: 700; font-size: 15px; }
  .cam-shutter-wrap { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .cam-shutter-wrap .scan-label { color: var(--teal); font-size: 14px; font-weight: 700; }
  #cam-shutter { width: 74px; height: 74px; border-radius: 50%; background: #fff; border: 5px solid var(--teal); cursor: pointer; }
  #cam-shutter:active { transform: scale(.94); }
</style>
</head>
<body>
<div id="app">
  <header>
    <img src="./icons/icon-192.png" alt="">
    <div class="search"><svg class="ic" width="18" height="18" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="Search documents">
    </div>
  </header>

  <!-- HOME -->
  <section id="view-home" class="view on">
    <div class="cards">
      <div class="qcard" id="qc-images">
        <svg viewBox="0 0 24 24" class="ic" stroke="#3b82f6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
        <div>Import Images</div>
      </div>
      <div class="qcard" id="qc-files">
        <svg viewBox="0 0 24 24" class="ic" stroke="#3b82f6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        <div>Import PDF/Files</div>
      </div>
    </div>
    <div class="section-title">Recents</div>
    <div id="home-list"></div>
  </section>

  <!-- FILES -->
  <section id="view-files" class="view">
    <div class="section-title" id="files-count">All documents</div>
    <div id="files-list"></div>
  </section>

  <!-- DOC VIEWER -->
  <section id="view-doc" class="view">
    <div class="vbar">
      <button id="doc-back"><svg class="ic" width="18" height="18" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <span class="nm" id="doc-name"></span>
      <button id="doc-ocr"><svg class="ic" width="16" height="16" viewBox="0 0 24 24"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>Text</button>
      <button class="share" id="doc-share"><svg class="ic" width="16" height="16" viewBox="0 0 24 24" stroke="#fff"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg>Share</button>
      <button class="del" id="doc-del"><svg class="ic" width="16" height="16" viewBox="0 0 24 24" stroke="#ef4444"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    </div>
    <div class="pages" id="doc-pages"></div>
    <div class="docfoot">
      <button id="doc-add"><svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg> Add pages</button>
    </div>
  </section>
</div>

<!-- bottom nav -->
<nav>
  <div class="tab active" data-tab="home"><svg class="ic" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/></svg>Home</div>
  <div class="cam" id="nav-cam"><div class="fab"><svg class="ic" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3.2"/></svg><span class="plus">+</span></div></div>
  <div class="tab" data-tab="files"><svg class="ic" viewBox="0 0 24 24"><path d="M4 4h7l2 2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>Files</div>
</nav>

<!-- live camera scanner -->
<div class="camera" id="camera">
  <div class="cbar">
    <button id="cam-close"><svg class="ic" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg></button>
    <span class="grow"></span>
    <button id="cam-flash" title="Flash"><svg class="ic" viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 9-12h-7z"/><path d="M3 3l18 18" stroke="#000" stroke-width="1.5" opacity=".0"/></svg></button>
    <button class="hd" id="cam-hd">HD<span class="rdot"></span></button>
    <button id="cam-filter" title="Filter"><svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="12" r="6"/><circle cx="15" cy="12" r="6"/></svg><span class="fdot"></span></button>
    <button id="cam-more" title="More"><svg class="ic" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.6" fill="#fff"/><circle cx="12" cy="12" r="1.6" fill="#fff"/><circle cx="19" cy="12" r="1.6" fill="#fff"/></svg></button>
  </div>
  <div class="cam-stage">
    <video id="cam-video" playsinline muted autoplay></video>
    <canvas id="cam-overlay"></canvas>
    <span class="hint" id="cam-hint">Point at a document</span>
    <div id="cam-stack">
      <div id="cam-thumb-wrap">
        <img id="cam-thumb" alt="">
        <span id="cam-count">0</span>
        <span id="cam-chev">›</span>
      </div>
      <button id="cam-modify">Modify</button>
    </div>
  </div>
  <div class="cam-seg" id="cam-seg">
    <div class="seg-pill">
      <button data-cap="single">Single</button>
      <button data-cap="batch" class="active">Batch</button>
    </div>
  </div>
  <div class="cam-modes" id="cam-modes">
    <span data-mode="text">Text</span><span data-mode="idcard">ID Cards</span><span data-mode="sign">Sign</span>
    <span data-mode="scan" class="active">Scan</span><span data-mode="toword">To Word</span><span data-mode="questionset">Question Set</span>
  </div>
  <div class="cam-controls">
    <div class="cam-side left">
      <button id="cam-grid" title="Photos"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
      <button id="cam-undo" title="Undo last" style="display:none"><svg class="ic" viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg></button>
    </div>
    <div class="cam-shutter-wrap">
      <span class="scan-label">Scan</span>
      <button id="cam-shutter" title="Capture"></button>
    </div>
    <div class="cam-side right">
      <button id="cam-gallery" title="Import photo"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.8"/><path d="m21 15-5-5L5 21"/></svg></button>
      <button id="cam-done" style="display:none">Done</button>
    </div>
  </div>
</div>

<!-- scan review sheet -->
<div class="sheet" id="scan-sheet">
  <div class="bar">
    <button id="scan-cancel">Cancel</button>
    <span class="grow"></span>
    <button class="save" id="scan-save">Save PDF</button>
  </div>
  <div class="pages" id="scan-pages"></div>
  <button class="addmore" id="scan-addmore">+ Add more pages</button>
  <div class="filters">
    <button data-mode="color">Color</button>
    <button data-mode="gray" class="active">Enhance</button>
    <button data-mode="bw">B&amp;W</button>
  </div>
  <div class="adjust" id="adjust">
    <label><span>Brightness</span><input type="range" id="adj-bri" min="-60" max="60" value="10"></label>
    <label><span>Contrast</span><input type="range" id="adj-con" min="60" max="240" value="140"></label>
    <label><span>Sharpness</span><input type="range" id="adj-sharp" min="0" max="100" value="40"></label>
  </div>
  <div class="titlerow"><input id="scan-title" placeholder="Document name"></div>
</div>

<!-- OCR result sheet -->
<div class="sheet" id="ocr-sheet">
  <div class="bar">
    <button id="ocr-close">Close</button>
    <span class="grow"></span>
    <button class="save" id="ocr-copy">Copy</button>
  </div>
  <div id="ocr-status">Recognizing…</div>

/* ---------- IndexedDB (documents live on the phone) ---------- */

/* ---------- image processing (the "scan" look) ---------- */
// Adjustable enhance settings (driven by the sliders in the review sheet)
let enh = { brightness: 10, contrast: 1.4, sharpness: 40 };

// Fast, good-looking enhance via OpenCV: brightness/contrast, unsharp-mask

function enhanceCanvasCV(canvas, mode, opts) {

}
// Pure-canvas fallback when OpenCV isn't ready (no sharpening)

}

/* ---------- build a PDF from page blobs (for share/export) ---------- */
async function buildPdf(pages) {
  const { PDFDocument } = PDFLib;
  const doc = await PDFDocument.create();
  const A4 = [595.28, 841.89], margin = 18;
  for (const p of pages) {
    const bytes = new Uint8Array(await p.blob.arrayBuffer());
    const jpg = await doc.embedJpg(bytes);
    // A4 page; landscape if the image is wider than tall; image fitted & centered
    const landscape = jpg.width > jpg.height;
    const pw = landscape ? A4[1] : A4[0], ph = landscape ? A4[0] : A4[1];
    const page = doc.addPage([pw, ph]);
    const s = Math.min((pw - margin * 2) / jpg.width, (ph - margin * 2) / jpg.height);
    const dw = jpg.width * s, dh = jpg.height * s;
    page.drawImage(jpg, { x: (pw - dw) / 2, y: (ph - dh) / 2, width: dw, height: dh });

}

/* ---------- scanning / capture flow ---------- */
let scan = { files: [], mode: "gray" }; // raw captured Files + chosen filter

/* ---- OpenCV document edge detection ---- */

// Find the document quad in a canvas. Returns NORMALIZED corners {tl,tr,br,bl}

function findCorners(canvas) {

$("nav-cam").onclick = () => openCamera(true);
$("cam-close").onclick = () => { stopCamera(); cameraEl.classList.remove("on"); scan = { files: [], mode: "gray" }; appendTarget = null; };
$("cam-undo").onclick = () => { scan.files.pop(); updateCamUI(); };
document.querySelectorAll(".cam-seg button").forEach((b) => b.onclick = () => {
  captureMode = b.dataset.cap;
  document.querySelectorAll(".cam-seg button").forEach((x) => x.classList.toggle("active", x === b));
});

/* mode strip: Scan + ID Cards are functional; others inform and fall back to Scan */
const MODE_INFO = {
  scan: "Scan: auto-crop + enhance each page",
  idcard: "ID Card: take front & back — both go on one page",
  text: "Text: after saving, it extracts editable text (OCR)",
  toword: "To Word: after saving, it exports a Word (.doc) file",
  sign: "Sign: coming soon",
  questionset: "Question Set isn't a scanner feature",
};
document.querySelectorAll(".cam-modes span").forEach((s) => s.onclick = () => {
  const m = s.dataset.mode;
  document.querySelectorAll(".cam-modes span").forEach((x) => x.classList.toggle("active", x === s));
  scanType = ["scan", "idcard", "text", "toword"].includes(m) ? m : "scan";
  if (m === "idcard") captureMode = "batch"; // need at least 2 shots
  toast(MODE_INFO[m] || "");
});

/* flash / torch toggle */
let torchOn = false;
$("cam-flash").onclick = async () => {
  try {
    const track = camStream && camStream.getVideoTracks()[0];
    const caps = track && track.getCapabilities ? track.getCapabilities() : {};
    if (!track || !caps.torch) { toast("Flash not available on this camera"); return; }
    torchOn = !torchOn;
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    $("cam-flash").classList.toggle("on", torchOn);
  } catch (e) { toast("Flash not available"); }
};

/* filter dot cycles the scan look + previews it live on the video */
const FILTERS = ["gray", "bw", "color"], FILTER_LABEL = { gray: "Enhance", bw: "B&W", color: "Color" };
function applyLivePreview() {
  camVideo.style.filter =
    scan.mode === "bw" ? "grayscale(1) contrast(2.2) brightness(1.1)" :
    scan.mode === "gray" ? "contrast(1.2) brightness(1.05) saturate(.9)" : "none";
}
$("cam-filter").onclick = () => {
  scan.mode = FILTERS[(FILTERS.indexOf(scan.mode) + 1) % FILTERS.length];
  applyLivePreview();
  toast("Filter: " + FILTER_LABEL[scan.mode]);
};

/* HD toggles capture quality/resolution */
$("cam-hd").onclick = () => {
  hdMode = !hdMode;
  $("cam-hd").classList.toggle("off", !hdMode);
  toast(hdMode ? "HD on — higher quality" : "HD off — smaller files");
};

/* ••• toggles auto-capture (shoots when a document is held steady) */
$("cam-more").onclick = () => {
  autoCapture = !autoCapture;
  $("cam-more").classList.toggle("on", autoCapture);
  toast(autoCapture ? "Auto-capture ON — hold steady on a document" : "Auto-capture OFF");
};

/* import existing photos as scanned pages, staying in the camera */
$("cam-grid").onclick = () => $("cam-gallery-input").click();
$("cam-gallery").onclick = () => $("cam-gallery-input").click();
$("cam-gallery-input").onchange = (e) => {
  const imgs = [...e.target.files].filter((f) => f.type.startsWith("image/"));
  e.target.value = "";
  if (!imgs.length) return;
  scan.files.push(...imgs);
  updateCamUI();
  toast(imgs.length + " photo" + (imgs.length > 1 ? "s" : "") + " added");
};

/* finish capturing -> open the review sheet (where you crop/filter/save) */
function finishToReview() {
  stopCamera(); cameraEl.classList.remove("on");
  if (!scan.files.length) return;
  document.querySelectorAll(".sheet .filters button").forEach((b) => b.classList.toggle("active", b.dataset.mode === scan.mode));
  scanSheet.classList.add("on");
  renderScanPages();
}
$("cam-modify").onclick = finishToReview;
$("cam-thumb-wrap").onclick = finishToReview;
function doCapture() {
  if (!camVideo.videoWidth) return;
  const c = document.createElement("canvas");
  c.width = camVideo.videoWidth; c.height = camVideo.videoHeight;
  c.getContext("2d").drawImage(camVideo, 0, 0);
  // prefer the corners the green box is currently showing; else detect on the still
  let cn = null;
  if (cvReady) {
    if (lastCorners && (Date.now() - lastSeenAt) < 800) cn = lastCorners;
    else { try { cn = findCorners(c); } catch (e) {} }
  }
  let pageCanvas = c, cropped = false;
  if (cn) { try { pageCanvas = warpToDoc(c, cn); cropped = true; } catch (e) { pageCanvas = c; } }
  pageCanvas.toBlob((blob) => {
    scan.files.push(new File([blob], "page.jpg", { type: "image/jpeg" }));
    updateCamUI();
    if (!cropped) toast("No clear document edges — captured full frame");
    if (captureMode === "single") finishToReview();
  }, "image/jpeg", hdMode ? 0.95 : 0.85);
}
$("cam-shutter").onclick = doCapture;
$("cam-done").onclick = finishToReview;
$("qc-images").onclick = () => { scan = { files: [], mode: "gray" }; $("scan-title").value = ""; $("img-input").click(); };

function addCaptured(fileList) {
  const imgs = [...fileList].filter((f) => f.type.startsWith("image/"));
  if (!imgs.length) return;
  scan.files.push(...imgs);
  document.querySelectorAll(".sheet .filters button").forEach((b) => b.classList.toggle("active", b.dataset.mode === scan.mode));
  scanSheet.classList.add("on");
  renderScanPages();
}
$("cam-input").onchange = (e) => { addCaptured(e.target.files); e.target.value = ""; };
$("img-input").onchange = (e) => { addCaptured(e.target.files); e.target.value = ""; };
$("scan-addmore").onclick = () => { scanSheet.classList.remove("on"); openCamera(false); };
$("scan-cancel").onclick = () => { scanSheet.classList.remove("on"); scan = { files: [], mode: "gray" }; appendTarget = null; };

document.querySelectorAll(".sheet .filters button").forEach((b) => b.onclick = () => {
  scan.mode = b.dataset.mode;
  document.querySelectorAll(".sheet .filters button").forEach((x) => x.classList.toggle("active", x === b));
  renderScanPages();
});

// Enhance sliders -> update settings + re-render preview (debounced)
let adjTimer = null;
function readAdjust() {
  enh = { brightness: +$("adj-bri").value, contrast: (+$("adj-con").value) / 100, sharpness: +$("adj-sharp").value };
}
["adj-bri", "adj-con", "adj-sharp"].forEach((id) => {
  const el = $(id); if (!el) return;
  el.addEventListener("input", () => { readAdjust(); clearTimeout(adjTimer); adjTimer = setTimeout(renderScanPages, 250); });
});

async function renderScanPages() {
  const wrap = $("scan-pages"); wrap.innerHTML = "";
  for (const f of scan.files) {
    const { blob } = await processFile(f, scan.mode);
    const img = document.createElement("img"); img.src = URL.createObjectURL(blob); wrap.append(img);
  }
}
// place two scanned images onto one white page (used by ID Cards mode)
async function combinePair(blobA, blobB) {
  const a = await createImageBitmap(blobA);
  const b = blobB ? await createImageBitmap(blobB) : null;
  const pad = 40, gap = 40;
  const innerW = Math.max(a.width, b ? b.width : 0);
  const W = innerW + pad * 2;
  const H = pad * 2 + a.height + (b ? gap + b.height : 0);
  const cv2 = document.createElement("canvas"); cv2.width = W; cv2.height = H;
  const ctx = cv2.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H);
  ctx.drawImage(a, pad + (innerW - a.width) / 2, pad);
  if (b) ctx.drawImage(b, pad + (innerW - b.width) / 2, pad + a.height + gap);
  const blob = await new Promise((r) => cv2.toBlob(r, "image/jpeg", 0.9));
  return { blob, w: W, h: H };
}
$("scan-save").onclick = async () => {
  if (!scan.files.length) { toast("No pages to save"); return; }
  toast("Saving…");
  try {
    let pages = [];
    for (const f of scan.files) pages.push(await processFile(f, scan.mode));
    if (scanType === "idcard" && pages.length > 1) {
      const combined = [];
      for (let i = 0; i < pages.length; i += 2) combined.push(await combinePair(pages[i].blob, pages[i + 1] ? pages[i + 1].blob : null));
      pages = combined;
    }
    if (appendTarget) { // adding pages to an existing document
      const tgt = await dbGet(appendTarget);
      if (tgt) {
        tgt.pages = tgt.pages.concat(pages);
        await dbPut(tgt);
        const tid = appendTarget; appendTarget = null;
        scanSheet.classList.remove("on"); scan = { files: [], mode: "gray" };
        toast("Added " + pages.length + " page(s)"); openDoc(tid); return;
      }
      appendTarget = null;
    }
    const created = Date.now();
    const name = ($("scan-title").value || "").trim() || ("Scan " + fmtDate(created));
    const id = "d" + created + "_" + Math.round(performance.now());
    const savedDoc = { id, name, created, pages };
    await dbPut(savedDoc);
    const mode = scanType;
    scanSheet.classList.remove("on"); scan = { files: [], mode: "gray" };
    toast("Saved");
    show("files");
    if (mode === "text" || mode === "toword") runOcr(savedDoc, mode === "toword");
  } catch (e) { toast("Save failed: " + e.message); }
};

/* ---------- import existing PDF/files (Home > Import PDF/Files) ---------- */
$("qc-files").onclick = () => $("file-input").click();
$("file-input").onchange = async (e) => {
  const files = [...e.target.files]; e.target.value = "";
  if (!files.length) return;
  // images -> treat as a scan; PDFs -> store the raw PDF as a single-"page" doc reference
  const imgs = files.filter((f) => f.type.startsWith("image/"));
  if (imgs.length) { scan = { files: [], mode: "color" }; $("scan-title").value = ""; addCaptured(imgs); return; }
  toast("Tip: import images to scan. (PDF editing lives in the desktop app.)");
};

/* ---------- OCR (Tesseract.js, 100% on-device) ---------- */
const ocrSheet = $("ocr-sheet");
let _ocrWorker = null, _ocrSrc = null;
async function getOcrWorker(onProgress) {
  if (_ocrWorker) return _ocrWorker;
  if (typeof Tesseract === "undefined") throw new Error("OCR library not loaded");
  const vbase = new URL("./vendor/", location.href).href; // absolute so the worker resolves paths correctly
  _ocrWorker = await Tesseract.createWorker(["eng", "chi_tra"], 1, {
    workerPath: vbase + "tesseract/worker.min.js",
    corePath: vbase + "tesseract/",
    langPath: vbase + "tessdata/",
    gzip: false,
    logger: (m) => { if (onProgress) onProgress(m); },
  });
  return _ocrWorker;
}
async function runOcr(doc, asWord) {
  if (!doc || !doc.pages || !doc.pages.length) { toast("Nothing to recognize"); return; }
  _ocrSrc = doc;
  $("ocr-text").value = "";
  $("ocr-status").textContent = "Loading OCR engine (first run downloads ~13 MB, then cached)…";
  ocrSheet.classList.add("on");
  try {
    const worker = await getOcrWorker((m) => {
      if (m.status === "recognizing text") $("ocr-status").textContent = "Recognizing… " + Math.round(m.progress * 100) + "%";
      else if (m.status) $("ocr-status").textContent = m.status.charAt(0).toUpperCase() + m.status.slice(1) + "…";
    });
    let all = "";
    for (let i = 0; i < doc.pages.length; i++) {
      $("ocr-status").textContent = "Recognizing page " + (i + 1) + " / " + doc.pages.length + "…";
      const { data } = await worker.recognize(doc.pages[i].blob);
      if (doc.pages.length > 1) all += "--- Page " + (i + 1) + " ---\n";
      all += (data.text || "").trim() + "\n\n";
    }
    $("ocr-text").value = all.trim();
    $("ocr-status").textContent = "Done — " + doc.pages.length + " page(s) recognized. Edit if needed, then Copy/Save.";
    if (asWord) saveOcrWord();
  } catch (e) {
    $("ocr-status").textContent = "OCR failed: " + e.message;
  }
}
function escapeHtml(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
async function shareOrDownload(blob, filename, title) {
  const file = new File([blob], filename, { type: blob.type });
  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: title || filename }); return; }
  } catch (e) { if (e && e.name === "AbortError") return; }
  const url = URL.createObjectURL(blob); const a = document.createElement("a");
  a.href = url; a.download = filename; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function ocrName() { return (_ocrSrc && _ocrSrc.name) ? _ocrSrc.name : "document"; }
function saveOcrTxt() { shareOrDownload(new Blob([$("ocr-text").value], { type: "text/plain;charset=utf-8" }), ocrName() + ".txt", ocrName()); }
function saveOcrWord() {
  const body = $("ocr-text").value.split("\n").map((l) => "<p>" + (escapeHtml(l) || "&nbsp;") + "</p>").join("");
  const html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>' + body + "</body></html>";
  shareOrDownload(new Blob(["﻿" + html], { type: "application/msword" }), ocrName() + ".doc", ocrName());
}
$("ocr-close").onclick = () => ocrSheet.classList.remove("on");
$("ocr-copy").onclick = async () => {
  try { await navigator.clipboard.writeText($("ocr-text").value); toast("Copied"); }
  catch (e) { const t = $("ocr-text"); t.select(); document.execCommand("copy"); toast("Copied"); }
};
$("ocr-txt").onclick = saveOcrTxt;
$("ocr-word").onclick = saveOcrWord;
$("doc-ocr").onclick = () => { if (currentDoc) runOcr(currentDoc, false); };

/* ---------- service worker ---------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
renderHome();
</script>
