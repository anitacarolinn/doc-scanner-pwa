<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Doc Scanner</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#14b8a6">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Scanner">
<style>
  :root { --teal:#14b8a6; --teal-d:#0d9488; --blue:#3b82f6; --ink:#1f2937; --muted:#9ca3af;
          --line:#eceef1; --bg:#f4f5f7; --safe-b: env(safe-area-inset-bottom, 0px); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { font-family: -apple-system, system-ui, "Segoe UI", "Microsoft JhengHei", sans-serif;
         background: var(--bg); color: var(--ink); overscroll-behavior: none; }
  #app { max-width: 560px; margin: 0 auto; min-height: 100%; padding-bottom: calc(78px + var(--safe-b)); }

  /* top bar */
  header { position: sticky; top: 0; z-index: 10; background: #fff; padding: 12px 16px 10px;
           border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  header img { width: 26px; height: 26px; }
  header .title { font-weight: 700; font-size: 18px; }
  .search { flex: 1; display: flex; align-items: center; gap: 8px; background: #f1f2f4; border-radius: 10px;
            padding: 8px 12px; color: var(--muted); }
  .search input { border: none; background: none; outline: none; width: 100%; font-size: 15px; color: var(--ink); }

  /* views */
  .view { display: none; padding: 14px 16px 0; }
  .view.on { display: block; }

  /* quick action cards */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .qcard { background: #fff; border-radius: 14px; padding: 18px 12px; text-align: center;
           box-shadow: 0 1px 3px rgba(0,0,0,.06); cursor: pointer; }
  .qcard svg { width: 34px; height: 34px; }
  .qcard div { margin-top: 8px; font-size: 14px; font-weight: 600; }

  .section-title { font-size: 15px; font-weight: 700; margin: 4px 2px 10px; color: #374151; }

  /* document list */
  .doc { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 12px;
         padding: 10px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.05); cursor: pointer; }
  .doc .thumb { width: 56px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--line);
                background: #fafafa; flex: none; }
  .doc .meta { flex: 1; min-width: 0; }
  .doc .meta .nm { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc .meta .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .empty { text-align: center; color: var(--muted); padding: 50px 20px; }
  .empty svg { width: 54px; height: 54px; opacity: .4; }
  .empty p { margin: 12px 0 0; font-size: 14px; }

  /* bottom nav */
  nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; height: calc(64px + var(--safe-b));
        padding-bottom: var(--safe-b); background: #fff; border-top: 1px solid var(--line);
        display: flex; align-items: flex-start; justify-content: space-around; max-width: 560px; margin: 0 auto; }
  nav .tab { flex: 1; text-align: center; padding-top: 9px; color: var(--muted); font-size: 11px; cursor: pointer; }
  nav .tab svg { width: 23px; height: 23px; display: block; margin: 0 auto 3px; }
  nav .tab.active { color: var(--teal); }
  nav .cam { flex: none; width: 64px; }
  nav .cam .fab { width: 60px; height: 60px; margin: -22px auto 0; border-radius: 50%; background: var(--teal);
                  display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(20,184,166,.5); }
  nav .cam .fab svg { width: 28px; height: 28px; stroke: #fff; margin: 0; }
  nav .cam .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .ic { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* scan review (fullscreen) */
  .sheet { position: fixed; inset: 0; z-index: 50; background: #111; color: #fff; display: none; flex-direction: column; }
  .sheet.on { display: flex; }
  .sheet .bar { display: flex; align-items: center; gap: 10px; padding: calc(10px + env(safe-area-inset-top)) 14px 10px; }
  .sheet .bar .grow { flex: 1; }
  .sheet .bar button { background: none; border: none; color: #fff; font-size: 16px; padding: 6px 8px; cursor: pointer; }
  .sheet .bar .save { background: var(--teal); border-radius: 8px; font-weight: 600; padding: 8px 16px; }
  .sheet .pages { flex: 1; overflow: auto; padding: 8px 16px; }
  .sheet .pages img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.4); }
  .sheet .filters { display: flex; gap: 8px; justify-content: center; padding: 10px; }
  .sheet .filters button { background: #2a2a2a; color: #ddd; border: 1px solid #3a3a3a; border-radius: 20px;
                           padding: 7px 16px; font-size: 13px; cursor: pointer; }
  .sheet .filters button.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .sheet .titlerow { padding: 8px 16px calc(12px + var(--safe-b)); }
  .sheet .titlerow input { width: 100%; padding: 11px 12px; border-radius: 10px; border: none; font-size: 15px; }
  .sheet .addmore { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #1f1f1f;
                    color: var(--teal); border: 1px dashed #3a3a3a; border-radius: 10px; font-size: 14px; cursor: pointer; }

  /* doc viewer */
  #view-doc .vbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  #view-doc .vbar .nm { flex: 1; font-weight: 700; font-size: 16px; }
  #view-doc .vbar button { border: 1px solid var(--line); background: #fff; border-radius: 9px; padding: 8px 12px;
                           font-size: 13px; cursor: pointer; display: inline-flex; gap: 5px; align-items: center; }
  #view-doc .vbar button.share { background: var(--teal); color: #fff; border-color: var(--teal); }
  #view-doc .vbar button.del { color: #ef4444; }
  #view-doc .pages img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.12); }

  .toast { position: fixed; left: 50%; bottom: calc(96px + var(--safe-b)); transform: translateX(-50%);
           background: #111; color: #fff; padding: 10px 16px; border-radius: 22px; font-size: 13px; z-index: 60;
           opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: .92; }

  /* camera FAB "+" badge + remove label */
  nav .cam .fab { position: relative; }
  nav .cam .plus { position: absolute; top: -3px; right: -3px; width: 21px; height: 21px; background: #f97316;
    color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; line-height: 1; border: 2px solid #fff; }

  /* live camera scanner */
  .camera { position: fixed; inset: 0; z-index: 55; background: #000; display: none; flex-direction: column; }
  .camera.on { display: flex; }
  .camera .cbar { padding: calc(8px + env(safe-area-inset-top)) 16px 8px; display: flex; align-items: center; }
  .camera .cbar button { background: none; border: none; color: #fff; padding: 6px; cursor: pointer; }
  .camera .cbar .ic { width: 26px; height: 26px; stroke: #fff; }
  .camera .hint { color: #fff; font-size: 13px; opacity: .85; margin-left: 12px; }
  .camera .cam-stage { position: relative; flex: 1; overflow: hidden; background: #000; }
  .camera .cam-stage video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .camera .cam-stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .camera .cam-mode { display: flex; justify-content: center; gap: 0; padding: 8px; }
  .camera .cam-mode button { background: rgba(255,255,255,.12); color: #cbd5e1; border: none; padding: 6px 20px;
    font-size: 14px; cursor: pointer; }
  .camera .cam-mode button:first-child { border-radius: 16px 0 0 16px; }
  .camera .cam-mode button:last-child { border-radius: 0 16px 16px 0; }
  .camera .cam-mode button.active { background: #fff; color: #111; font-weight: 600; }
  .camera .cam-controls { position: relative; display: flex; align-items: center; justify-content: center;
    padding: 14px 24px calc(22px + var(--safe-b)); }
  #cam-shutter { width: 74px; height: 74px; border-radius: 50%; background: #fff; border: 5px solid var(--teal); cursor: pointer; }
  #cam-shutter:active { transform: scale(.94); }
  #cam-undo { position: absolute; left: 26px; top: 50%; transform: translateY(-50%); color: #fff;
    background: rgba(255,255,255,.16); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; }
  #cam-undo .ic { width: 22px; height: 22px; stroke: #fff; }
  #cam-done-wrap { position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 7px; }
  #cam-thumb-wrap { position: relative; }
  #cam-thumb { width: 46px; height: 60px; object-fit: cover; border-radius: 6px; border: 2px solid #fff; background:#222; }
  #cam-count { position: absolute; top: -8px; right: -8px; background: #f97316; color: #fff; font-size: 11px;
    min-width: 19px; height: 19px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
  #cam-done { background: var(--teal); color: #fff; border: none; border-radius: 9px; padding: 9px 18px; font-weight: 600; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <header>
    <img src="./icons/icon-192.png" alt="">
    <div class="search"><svg class="ic" width="18" height="18" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="Search documents">
    </div>
  </header>

  <!-- HOME -->
  <section id="view-home" class="view on">
    <div class="cards">
      <div class="qcard" id="qc-images">
        <svg viewBox="0 0 24 24" class="ic" stroke="#3b82f6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
        <div>Import Images</div>
      </div>
      <div class="qcard" id="qc-files">
        <svg viewBox="0 0 24 24" class="ic" stroke="#3b82f6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        <div>Import PDF/Files</div>
      </div>
    </div>
    <div class="section-title">Recents</div>
    <div id="home-list"></div>
  </section>

  <!-- FILES -->
  <section id="view-files" class="view">
    <div class="section-title" id="files-count">All documents</div>
    <div id="files-list"></div>
  </section>

  <!-- DOC VIEWER -->
  <section id="view-doc" class="view">
    <div class="vbar">
      <button id="doc-back"><svg class="ic" width="18" height="18" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <span class="nm" id="doc-name"></span>
      <button class="share" id="doc-share"><svg class="ic" width="16" height="16" viewBox="0 0 24 24" stroke="#fff"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg>Share</button>
      <button class="del" id="doc-del"><svg class="ic" width="16" height="16" viewBox="0 0 24 24" stroke="#ef4444"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    </div>
    <div class="pages" id="doc-pages"></div>
  </section>
</div>

<!-- bottom nav -->
<nav>
  <div class="tab active" data-tab="home"><svg class="ic" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/></svg>Home</div>
  <div class="cam" id="nav-cam"><div class="fab"><svg class="ic" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3.2"/></svg><span class="plus">+</span></div></div>
  <div class="tab" data-tab="files"><svg class="ic" viewBox="0 0 24 24"><path d="M4 4h7l2 2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>Files</div>
</nav>

<!-- live camera scanner -->
<div class="camera" id="camera">
  <div class="cbar">
    <button id="cam-close"><svg class="ic" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg></button>
    <span class="hint" id="cam-hint">Point at a document</span>
  </div>
  <div class="cam-stage">
    <video id="cam-video" playsinline muted autoplay></video>
    <canvas id="cam-overlay"></canvas>
  </div>
  <div class="cam-mode">
    <button data-cap="single">Single</button>
    <button data-cap="batch" class="active">Batch</button>
  </div>
  <div class="cam-controls">
    <button id="cam-undo" title="Undo last"><svg class="ic" viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg></button>
    <button id="cam-shutter" title="Capture"></button>
    <div id="cam-done-wrap">
      <div id="cam-thumb-wrap"><img id="cam-thumb" alt=""><span id="cam-count">0</span></div>
      <button id="cam-done">Done</button>
    </div>
  </div>
</div>

<!-- scan review sheet -->
<div class="sheet" id="scan-sheet">
  <div class="bar">
    <button id="scan-cancel">Cancel</button>
    <span class="grow"></span>
    <button class="save" id="scan-save">Save PDF</button>
  </div>
  <div class="pages" id="scan-pages"></div>
  <button class="addmore" id="scan-addmore">+ Add more pages</button>
  <div class="filters">
    <button data-mode="color">Color</button>
    <button data-mode="gray" class="active">Enhance</button>
    <button data-mode="bw">B&amp;W</button>
  </div>
  <div class="titlerow"><input id="scan-title" placeholder="Document name"></div>
</div>

<!-- hidden inputs -->
<input type="file" id="cam-input" accept="image/*" capture="environment" multiple hidden>
<input type="file" id="img-input" accept="image/*" multiple hidden>
<input type="file" id="file-input" accept="application/pdf,image/*" multiple hidden>

<div class="toast" id="toast"></div>

<script src="./vendor/pdf-lib.min.js"></script>
<script async src="./vendor/opencv.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
function toast(msg) { const t = $("toast"); t.textContent = msg; t.classList.add("on"); setTimeout(() => t.classList.remove("on"), 1800); }
function fmtDate(ms) { const d = new Date(ms); const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

/* ---------- IndexedDB (documents live on the phone) ---------- */
let _db = null;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("docscanner", 1);
    r.onupgradeneeded = () => { r.result.createObjectStore("docs", { keyPath: "id" }); };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function db() { if (!_db) _db = await openDB(); return _db; }
async function dbPut(doc) { const d = await db(); return new Promise((res, rej) => { const t = d.transaction("docs", "readwrite"); t.objectStore("docs").put(doc); t.oncomplete = res; t.onerror = () => rej(t.error); }); }
async function dbAll() { const d = await db(); return new Promise((res, rej) => { const t = d.transaction("docs", "readonly"); const rq = t.objectStore("docs").getAll(); rq.onsuccess = () => res(rq.result || []); rq.onerror = () => rej(rq.error); }); }
async function dbGet(id) { const d = await db(); return new Promise((res, rej) => { const t = d.transaction("docs", "readonly"); const rq = t.objectStore("docs").get(id); rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }); }
async function dbDel(id) { const d = await db(); return new Promise((res, rej) => { const t = d.transaction("docs", "readwrite"); t.objectStore("docs").delete(id); t.oncomplete = res; t.onerror = () => rej(t.error); }); }

/* ---------- image processing (the "scan" look) ---------- */
async function processFile(file, mode) {
  const bmp = await createImageBitmap(file, { imageOrientation: "from-image" });
  const maxDim = 1600;
  const scale = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
  const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
  const canvas = document.createElement("canvas"); canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(bmp, 0, 0, w, h);
  if (mode !== "color") {
    const im = ctx.getImageData(0, 0, w, h), d = im.data;
    for (let i = 0; i < d.length; i += 4) {
      let v = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      if (mode === "bw") v = v > 150 ? 255 : 0;
      else v = (v - 128) * 1.45 + 128 + 12; // enhance: contrast + slight brighten
      v = v < 0 ? 0 : v > 255 ? 255 : v;
      d[i] = d[i+1] = d[i+2] = v;
    }
    ctx.putImageData(im, 0, 0);
  }
  const blob = await new Promise((r) => canvas.toBlob(r, "image/jpeg", 0.82));
  return { blob, w, h };
}

/* ---------- build a PDF from page blobs (for share/export) ---------- */
async function buildPdf(pages) {
  const { PDFDocument } = PDFLib;
  const doc = await PDFDocument.create();
  for (const p of pages) {
    const bytes = new Uint8Array(await p.blob.arrayBuffer());
    const jpg = await doc.embedJpg(bytes);
    const page = doc.addPage([jpg.width, jpg.height]);
    page.drawImage(jpg, { x: 0, y: 0, width: jpg.width, height: jpg.height });
  }
  return doc.save();
}

/* ---------- navigation ---------- */
function show(view) {
  document.querySelectorAll(".view").forEach((v) => v.classList.toggle("on", v.id === "view-" + view));
  document.querySelectorAll("nav .tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === view));
  if (view === "home") renderHome();
  if (view === "files") renderFiles();
}
document.querySelectorAll("nav .tab").forEach((t) => t.onclick = () => show(t.dataset.tab));

/* ---------- render lists ---------- */
function docRow(doc) {
  const el = document.createElement("div");
  el.className = "doc";
  const url = doc.pages[0] ? URL.createObjectURL(doc.pages[0].blob) : "";
  el.innerHTML = `<img class="thumb" src="${url}"><div class="meta"><div class="nm"></div>
    <div class="sub">${fmtDate(doc.created)} · ${doc.pages.length} page${doc.pages.length>1?"s":""}</div></div>`;
  el.querySelector(".nm").textContent = doc.name || "Untitled";
  el.onclick = () => openDoc(doc.id);
  return el;
}
async function renderHome() {
  const all = (await dbAll()).sort((a, b) => b.created - a.created);
  const list = $("home-list"); list.innerHTML = "";
  if (!all.length) { list.innerHTML = `<div class="empty"><svg class="ic" viewBox="0 0 24 24" stroke="#9ca3af"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><p>No documents yet.<br>Tap the green camera to scan.</p></div>`; return; }
  all.slice(0, 8).forEach((d) => list.append(docRow(d)));
}
async function renderFiles() {
  const q = ($("search").value || "").toLowerCase();
  let all = (await dbAll()).sort((a, b) => b.created - a.created);
  if (q) all = all.filter((d) => (d.name || "").toLowerCase().includes(q));
  $("files-count").textContent = "All documents (" + all.length + ")";
  const list = $("files-list"); list.innerHTML = "";
  if (!all.length) { list.innerHTML = `<div class="empty"><p>No documents.</p></div>`; return; }
  all.forEach((d) => list.append(docRow(d)));
}
$("search").addEventListener("input", () => { if ($("view-files").classList.contains("on")) renderFiles(); });

/* ---------- doc viewer ---------- */
let currentDocId = null;
async function openDoc(id) {
  const doc = await dbGet(id); if (!doc) return;
  currentDocId = id;
  $("doc-name").textContent = doc.name || "Untitled";
  const pg = $("doc-pages"); pg.innerHTML = "";
  doc.pages.forEach((p) => { const img = document.createElement("img"); img.src = URL.createObjectURL(p.blob); pg.append(img); });
  show("doc");
}
$("doc-back").onclick = () => show("files");
$("doc-del").onclick = async () => {
  if (!currentDocId) return;
  if (!confirm("Delete this document?")) return;
  await dbDel(currentDocId); currentDocId = null; toast("Deleted"); show("files");
};
$("doc-share").onclick = async () => {
  const doc = await dbGet(currentDocId); if (!doc) return;
  toast("Preparing PDF…");
  try {
    const bytes = await buildPdf(doc.pages);
    const file = new File([bytes], (doc.name || "document") + ".pdf", { type: "application/pdf" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: doc.name || "document" });
    } else {
      const url = URL.createObjectURL(file); const a = document.createElement("a");
      a.href = url; a.download = file.name; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1500);
    }
  } catch (e) { if (e && e.name !== "AbortError") toast("Share failed: " + e.message); }
};

/* ---------- scanning / capture flow ---------- */
let scan = { files: [], mode: "gray" }; // raw captured Files + chosen filter
const scanSheet = $("scan-sheet");
const cameraEl = $("camera"), camVideo = $("cam-video"), camOverlay = $("cam-overlay");
let camStream = null, captureMode = "batch", detectTimer = null;

/* ---- OpenCV document edge detection ---- */
let cvReady = false;
(function waitCv() { if (window.cv && window.cv.Mat) cvReady = true; else setTimeout(waitCv, 120); })();
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function orderCorners(p) {
  const bySum = [...p].sort((a, b) => (a.x + a.y) - (b.x + b.y));
  const byDiff = [...p].sort((a, b) => (a.x - a.y) - (b.x - b.y));
  return { tl: bySum[0], br: bySum[3], bl: byDiff[0], tr: byDiff[3] };
}
// find the largest 4-corner contour in a canvas; returns {tl,tr,br,bl} or null
function findCorners(canvas) {
  let src, gray, edged, contours, hierarchy, result = null;
  try {
    src = cv.imread(canvas); gray = new cv.Mat(); edged = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0);
    cv.Canny(gray, edged, 50, 150);
    const k = cv.Mat.ones(5, 5, cv.CV_8U); cv.dilate(edged, edged, k); k.delete();
    contours = new cv.MatVector(); hierarchy = new cv.Mat();
    cv.findContours(edged, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
    const minArea = src.rows * src.cols * 0.15;
    let best = null, bestArea = 0;
    for (let i = 0; i < contours.size(); i++) {
      const c = contours.get(i), area = cv.contourArea(c);
      if (area > bestArea && area > minArea) {
        const peri = cv.arcLength(c, true), approx = new cv.Mat();
        cv.approxPolyDP(c, approx, 0.02 * peri, true);
        if (approx.rows === 4) { if (best) best.delete(); best = approx; bestArea = area; } else approx.delete();
      }
      c.delete();
    }
    if (best) {
      const pts = [];
      for (let i = 0; i < 4; i++) pts.push({ x: best.data32S[i * 2], y: best.data32S[i * 2 + 1] });
      best.delete();
      result = orderCorners(pts);
    }
  } catch (e) { result = null; }
  if (src) src.delete(); if (gray) gray.delete(); if (edged) edged.delete();
  if (contours) contours.delete(); if (hierarchy) hierarchy.delete();
  return result;
}
// perspective-crop the frame to the detected document
function warpToDoc(canvas, c) {
  const src = cv.imread(canvas);
  const W = Math.max(40, Math.round(Math.max(dist(c.tl, c.tr), dist(c.bl, c.br))));
  const H = Math.max(40, Math.round(Math.max(dist(c.tl, c.bl), dist(c.tr, c.br))));
  const s = cv.matFromArray(4, 1, cv.CV_32FC2, [c.tl.x, c.tl.y, c.tr.x, c.tr.y, c.br.x, c.br.y, c.bl.x, c.bl.y]);
  const d = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, W, 0, W, H, 0, H]);
  const M = cv.getPerspectiveTransform(s, d), dst = new cv.Mat();
  cv.warpPerspective(src, dst, M, new cv.Size(W, H));
  const out = document.createElement("canvas"); out.width = W; out.height = H; cv.imshow(out, dst);
  src.delete(); dst.delete(); M.delete(); s.delete(); d.delete();
  return out;
}
const detCanvas = document.createElement("canvas");
function drawOverlay(corners, dw) {
  const cw = camOverlay.clientWidth, ch = camOverlay.clientHeight;
  camOverlay.width = cw; camOverlay.height = ch;
  const ctx = camOverlay.getContext("2d");
  ctx.clearRect(0, 0, cw, ch);
  if (!corners) return;
  const vw = camVideo.videoWidth, vh = camVideo.videoHeight;
  const scale = Math.max(cw / vw, ch / vh), offX = (cw - vw * scale) / 2, offY = (ch - vh * scale) / 2;
  const f = (vw / dw) * scale;
  const m = (p) => ({ x: p.x * f + offX, y: p.y * f + offY });
  const tl = m(corners.tl), tr = m(corners.tr), br = m(corners.br), bl = m(corners.bl);
  ctx.beginPath(); ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y); ctx.closePath();
  ctx.fillStyle = "rgba(20,184,166,0.22)"; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = "#2dd4bf"; ctx.stroke();
}
function detectTick() {
  if (!cameraEl.classList.contains("on")) return;
  if (cvReady && camVideo.videoWidth) {
    const vw = camVideo.videoWidth, vh = camVideo.videoHeight;
    const dw = 320, dh = Math.round(320 * vh / vw);
    detCanvas.width = dw; detCanvas.height = dh;
    detCanvas.getContext("2d").drawImage(camVideo, 0, 0, dw, dh);
    const corners = findCorners(detCanvas);
    drawOverlay(corners, dw);
    $("cam-hint").textContent = corners ? "Document detected — tap to capture" : "Point at a document";
  }
  detectTimer = setTimeout(detectTick, 180);
}

async function openCamera(reset = true) {
  if (reset) { scan = { files: [], mode: "gray" }; $("scan-title").value = ""; }
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
    camVideo.srcObject = camStream;
    await camVideo.play();
    updateCamUI();
    cameraEl.classList.add("on");
    detectTick();
  } catch (e) {
    $("cam-input").click(); // blocked / not HTTPS -> native camera picker
  }
}
function stopCamera() {
  if (detectTimer) { clearTimeout(detectTimer); detectTimer = null; }
  if (camStream) { camStream.getTracks().forEach((t) => t.stop()); camStream = null; }
  camVideo.srcObject = null;
}
function updateCamUI() {
  const n = scan.files.length;
  $("cam-count").textContent = n;
  const has = n > 0;
  $("cam-undo").style.visibility = has ? "visible" : "hidden";
  $("cam-done-wrap").style.visibility = has ? "visible" : "hidden";
  if (has) $("cam-thumb").src = URL.createObjectURL(scan.files[n - 1]);
}
$("nav-cam").onclick = () => openCamera(true);
$("cam-close").onclick = () => { stopCamera(); cameraEl.classList.remove("on"); scan = { files: [], mode: "gray" }; };
$("cam-undo").onclick = () => { scan.files.pop(); updateCamUI(); };
document.querySelectorAll(".cam-mode button").forEach((b) => b.onclick = () => {
  captureMode = b.dataset.cap;
  document.querySelectorAll(".cam-mode button").forEach((x) => x.classList.toggle("active", x === b));
});
$("cam-shutter").onclick = () => {
  if (!camVideo.videoWidth) return;
  const c = document.createElement("canvas");
  c.width = camVideo.videoWidth; c.height = camVideo.videoHeight;
  c.getContext("2d").drawImage(camVideo, 0, 0);
  let pageCanvas = c;
  if (cvReady) { try { const corners = findCorners(c); if (corners) pageCanvas = warpToDoc(c, corners); } catch (e) {} }
  pageCanvas.toBlob((blob) => {
    scan.files.push(new File([blob], "page.jpg", { type: "image/jpeg" }));
    updateCamUI();
    if (captureMode === "single") $("cam-done").click();
  }, "image/jpeg", 0.92);
};
$("cam-done").onclick = () => {
  stopCamera(); cameraEl.classList.remove("on");
  if (!scan.files.length) return;
  document.querySelectorAll(".sheet .filters button").forEach((b) => b.classList.toggle("active", b.dataset.mode === scan.mode));
  scanSheet.classList.add("on");
  renderScanPages();
};
$("qc-images").onclick = () => { scan = { files: [], mode: "gray" }; $("scan-title").value = ""; $("img-input").click(); };

function addCaptured(fileList) {
  const imgs = [...fileList].filter((f) => f.type.startsWith("image/"));
  if (!imgs.length) return;
  scan.files.push(...imgs);
  document.querySelectorAll(".sheet .filters button").forEach((b) => b.classList.toggle("active", b.dataset.mode === scan.mode));
  scanSheet.classList.add("on");
  renderScanPages();
}
$("cam-input").onchange = (e) => { addCaptured(e.target.files); e.target.value = ""; };
$("img-input").onchange = (e) => { addCaptured(e.target.files); e.target.value = ""; };
$("scan-addmore").onclick = () => { scanSheet.classList.remove("on"); openCamera(false); };
$("scan-cancel").onclick = () => { scanSheet.classList.remove("on"); scan = { files: [], mode: "gray" }; };

document.querySelectorAll(".sheet .filters button").forEach((b) => b.onclick = () => {
  scan.mode = b.dataset.mode;
  document.querySelectorAll(".sheet .filters button").forEach((x) => x.classList.toggle("active", x === b));
  renderScanPages();
});

async function renderScanPages() {
  const wrap = $("scan-pages"); wrap.innerHTML = "";
  for (const f of scan.files) {
    const { blob } = await processFile(f, scan.mode);
    const img = document.createElement("img"); img.src = URL.createObjectURL(blob); wrap.append(img);
  }
}
$("scan-save").onclick = async () => {
  if (!scan.files.length) { toast("No pages to save"); return; }
  toast("Saving…");
  try {
    const pages = [];
    for (const f of scan.files) pages.push(await processFile(f, scan.mode));
    const created = Date.now();
    const name = ($("scan-title").value || "").trim() || ("Scan " + fmtDate(created));
    await dbPut({ id: "d" + created + "_" + Math.round(performance.now()), name, created, pages });
    scanSheet.classList.remove("on"); scan = { files: [], mode: "gray" };
    toast("Saved");
    show("files");
  } catch (e) { toast("Save failed: " + e.message); }
};

/* ---------- import existing PDF/files (Home > Import PDF/Files) ---------- */
$("qc-files").onclick = () => $("file-input").click();
$("file-input").onchange = async (e) => {
  const files = [...e.target.files]; e.target.value = "";
  if (!files.length) return;
  // images -> treat as a scan; PDFs -> store the raw PDF as a single-"page" doc reference
  const imgs = files.filter((f) => f.type.startsWith("image/"));
  if (imgs.length) { scan = { files: [], mode: "color" }; $("scan-title").value = ""; addCaptured(imgs); return; }
  toast("Tip: import images to scan. (PDF editing lives in the desktop app.)");
};

/* ---------- service worker ---------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
renderHome();
</script>
</body>
